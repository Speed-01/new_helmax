{% extends 'base01.html' %}
{% block content %}

<div class="min-h-screen bg-gray-100 py-8">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <!-- Header -->
        <div class="mb-8">
            <h1 class="text-3xl font-bold text-gray-900">Order Management</h1>
            <p class="mt-2 text-sm text-gray-600">Manage and track all customer orders</p>
        </div>

        <!-- Search and Filter Section -->
        <div class="mb-6 flex justify-between items-center">
            <div class="flex-1 max-w-lg">
                <div class="relative">
                    <input type="text" 
                           id="searchInput"
                           class="w-full pl-10 pr-4 py-2 rounded-lg border border-gray-300 focus:outline-none focus:border-blue-500"
                           placeholder="Search by username...">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <svg class="h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                        </svg>
                    </div>
                </div>
            </div>
        </div>

        <!-- Orders Table -->
        <div class="bg-white shadow overflow-hidden sm:rounded-lg">
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Order ID</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Username</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Payment Method</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Status</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Total Price</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Date</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Actions</th>
                    </tr>
                </thead>
                <tbody id="ordersTableBody" class="bg-white divide-y divide-gray-200">
                    <!-- Table content will be populated by JavaScript -->
                </tbody>
            </table>
        </div>

        <!-- Pagination -->
        <div class="mt-4 flex justify-between items-center">
            <div class="text-sm text-gray-700">
                Showing page <span id="currentPage">1</span> of <span id="totalPages">1</span>
            </div>
            <div class="flex space-x-2">
                <button id="prevPage" class="px-4 py-2 border border-gray-300 rounded-md text-sm font-medium text-gray-700 bg-white hover:bg-gray-50">
                    Previous
                </button>
                <button id="nextPage" class="px-4 py-2 border border-gray-300 rounded-md text-sm font-medium text-gray-700 bg-white hover:bg-gray-50">
                    Next
                </button>
            </div>
        </div>
    </div>
</div>

<!-- JavaScript for handling dynamic content -->
<script>
let currentPage = 1;
let totalPages = 1;

function fetchOrders(page = 1, search = '') {
    fetch(`/admin_orders/api/?page=${page}&search=${encodeURIComponent(search)}`)
        .then(response => response.json())
        .then(data => {
            totalPages = data.total_pages;
            updateTable(data.orders);
            updatePagination();
        })
        .catch(error => console.error('Error:', error));
}

function updateTable(orders) {
    const tbody = document.getElementById('ordersTableBody');
    tbody.innerHTML = '';
    
    orders.forEach(order => {
        // Main order row
        const tr = document.createElement('tr');
        tr.className = 'hover:bg-gray-50 cursor-pointer';
        tr.innerHTML = `
            <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">#${order.id}</td>
            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${order.username}</td>
            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${order.payment_method}</td>
            <td class="px-6 py-4 whitespace-nowrap">
                <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full 
                    ${getStatusColor(order.status)}">
                    ${order.status}
                </span>
            </td>
            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">$${order.total_price.toFixed(2)}</td>
            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${order.created_at}</td>
            <td class="px-6 py-4 whitespace-nowrap text-sm font-medium">
                <button onclick="toggleOrderDetails(${order.id})" 
                        class="text-indigo-600 hover:text-indigo-900">
                    View Details
                </button>
            </td>
        `;
        tbody.appendChild(tr);

        // Order details row (initially hidden)
        const detailsRow = document.createElement('tr');
        detailsRow.id = `order-details-${order.id}`;
        detailsRow.className = 'hidden bg-gray-50';
        
        // Create the details content
        let detailsContent = `
            <td colspan="7" class="px-6 py-4">
                <div class="border-t border-gray-200 px-4 py-5 sm:p-0">
                    <h4 class="font-semibold mb-4">Order Items</h4>
                    <div class="grid grid-cols-1 gap-4">
        `;

        order.items.forEach(item => {
            detailsContent += `
                <div class="bg-white p-4 rounded-lg shadow-sm">
                    <div class="grid grid-cols-4 gap-4">
                        <div>
                            <span class="text-sm font-medium text-gray-500">Product</span>
                            <p class="mt-1 text-sm text-gray-900">${item.product_name}</p>
                        </div>
                        <div>
                            <span class="text-sm font-medium text-gray-500">Variant</span>
                            <p class="mt-1 text-sm text-gray-900">${item.variant_details}</p>
                        </div>
                        <div>
                            <span class="text-sm font-medium text-gray-500">Quantity</span>
                            <p class="mt-1 text-sm text-gray-900">${item.quantity}</p>
                        </div>
                        <div>
                            <span class="text-sm font-medium text-gray-500">Price</span>
                            <p class="mt-1 text-sm text-gray-900">$${item.price.toFixed(2)}</p>
                        </div>
                    </div>
                    <div class="mt-2">
                        <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full ${getStatusColor(item.status)}">
                            ${item.status}
                        </span>
                    </div>
                </div>
            `;
        });

        detailsContent += `
                    </div>
                </div>
            </td>
        `;
        
        detailsRow.innerHTML = detailsContent;
        tbody.appendChild(detailsRow);
    });
}

function toggleOrderDetails(orderId) {
    const detailsRow = document.getElementById(`order-details-${orderId}`);
    if (detailsRow.classList.contains('hidden')) {
        detailsRow.classList.remove('hidden');
    } else {
        detailsRow.classList.add('hidden');
    }
}

function getStatusColor(status) {
    const colors = {
        'PROCESSING': 'bg-yellow-100 text-yellow-800',
        'SHIPPED': 'bg-blue-100 text-blue-800',
        'DELIVERED': 'bg-green-100 text-green-800',
        'CANCELLED': 'bg-red-100 text-red-800',
        'RETURNED': 'bg-gray-100 text-gray-800',
        'Pending': 'bg-yellow-100 text-yellow-800',
        'Delivered': 'bg-green-100 text-green-800',
        'Cancelled': 'bg-red-100 text-red-800',
        'Returned': 'bg-gray-100 text-gray-800',
        'Shipped': 'bg-blue-100 text-blue-800'
    };
    return colors[status] || 'bg-gray-100 text-gray-800';
}

function updatePagination() {
    document.getElementById('currentPage').textContent = currentPage;
    document.getElementById('totalPages').textContent = totalPages;
    document.getElementById('prevPage').disabled = currentPage === 1;
    document.getElementById('nextPage').disabled = currentPage === totalPages;
}

// Event Listeners
document.getElementById('prevPage').addEventListener('click', () => {
    if (currentPage > 1) {
        currentPage--;
        fetchOrders(currentPage, document.getElementById('searchInput').value);
    }
});

document.getElementById('nextPage').addEventListener('click', () => {
    if (currentPage < totalPages) {
        currentPage++;
        fetchOrders(currentPage, document.getElementById('searchInput').value);
    }
});

document.getElementById('searchInput').addEventListener('input', debounce((e) => {
    currentPage = 1;
    fetchOrders(1, e.target.value);
}, 300));

function debounce(func, wait) {
    let timeout;
    return function executedFunction(...args) {
        const later = () => {
            clearTimeout(timeout);
            func(...args);
        };
        clearTimeout(timeout);
        timeout = setTimeout(later, wait);
    };
}

// Initial load
fetchOrders();
</script>

{% endblock %}
